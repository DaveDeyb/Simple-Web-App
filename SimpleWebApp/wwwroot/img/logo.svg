<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Clock circle background -->
  <circle cx="50" cy="50" r="45" fill="#2563eb" stroke="#1d4ed8" stroke-width="3"/>
  
  <!-- Clock face circle -->
  <circle cx="50" cy="50" r="38" fill="#ffffff" opacity="0.2"/>
  
  <!-- Hour marks - thicker -->
  <g stroke="#ffffff" stroke-width="3" opacity="1">
    <line x1="50" y1="10" x2="50" y2="18"/>
    <line x1="50" y1="82" x2="50" y2="90"/>
    <line x1="10" y1="50" x2="18" y2="50"/>
    <line x1="82" y1="50" x2="90" y2="50"/>
  </g>
  
  <!-- Clock hands - thicker -->
  <g stroke="#ffffff" stroke-width="2.5" stroke-linecap="round">
    <!-- Hour hand -->
    <line x1="50" y1="50" x2="50" y2="30"/>
    <!-- Minute hand -->
    <line x1="50" y1="50" x2="68" y2="50"/>
  </g>
  
  <!-- Center dot - larger -->
  <circle cx="50" cy="50" r="4" fill="#ffffff"/>
  
  <!-- Play button triangle overlay - larger, more visible -->
  <polygon points="42,32 42,68 72,50" fill="#06b6d4" opacity="1"/>
  
  <!-- Play button outline for more definition -->
  <polygon points="42,32 42,68 72,50" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.8"/>
</svg>